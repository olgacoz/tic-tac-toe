<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <link rel="stylesheet" href="./styles.css">
  <script src="./script.js" defer></script>
</head>

<body>
  <h1>Tic Tac Toe</h1>
  <div id="game-info"></div>
  <div id="game-container">
    <input id="player1" type="text" placeholder="Player 1 (X) name" value="Player 1">
    <div id="game-board"></div>
    <input id="player2" type="text" placeholder="Player 2 (O) name" value="Player 2">
  </div>
  <div id="scoreboard"></div>
  <button id="start-restart-btn">Start / Restart Game</button>
</body>

</html>
